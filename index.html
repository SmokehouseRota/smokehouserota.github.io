<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Smokehouse Rota — 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Karla:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --paper:        #fdf6e9;
    --paper-dark:   #f0e6cc;
    --ink:          #1c1209;
    --rule:         #d4c4a0;
    --header-bg:    #1c1209;
    --weekend-tint: #f5edd8;

    --kasper: #3a6fd8;   /* blue */
    --claire: #9b30b8;   /* purple */
    --sid:    #d94f7a;   /* pink */
    --daisy:  #cc3333;   /* red */
    --jake:   #2e9e45;   /* green */
    --jim:    #d4751a;   /* orange */
    --roxy:   #1a1a1a;   /* black */
    --max:    #0e9e9e;   /* teal */
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #c8b89a;
    background-image:
      radial-gradient(ellipse at 20% 50%, rgba(180,150,100,0.3) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(160,130,80,0.2) 0%, transparent 50%);
    font-family: 'Karla', sans-serif;
    padding: 20px 12px 48px;
  }

  .page { max-width: 980px; margin: 0 auto; }

  /* Fish SVG watermark — injected per month */
  .month-block {
    background: var(--paper);
    border-radius: 6px;
    overflow: hidden;
    box-shadow: 0 8px 40px rgba(0,0,0,0.25), 0 2px 6px rgba(0,0,0,0.12);
    margin-bottom: 36px;
    position: relative;
  }

  /* Rope border effect between cells using repeating gradient */
  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 14.2857%);
    width: 100%;
    border-left: none;
    border-top: none;
    background:
      repeating-linear-gradient(
        90deg,
        transparent,
        transparent calc(14.2857% - 1.5px),
        #c8a87a calc(14.2857% - 1.5px),
        #e8d0a0 calc(14.2857% - 0.5px),
        #c8a87a calc(14.2857%),
        transparent calc(14.2857%)
      );
  }

  .dow-row {
    display: grid;
    grid-template-columns: repeat(7, 14.2857%);
    width: 100%;
    background: var(--paper-dark);
    border-bottom: 3px solid #8a6a3a;
    border-top: 1px solid #c8a87a;
  }
  .dow-cell {
    padding: 8px 4px 7px;
    text-align: center;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #6a5030;
    overflow: hidden;
    border-right: 1.5px solid #c8a87a;
  }
  .dow-cell:last-child { border-right: none; }
  .dow-cell.we { color: #b84a00; }

  .day-cell {
    border-right: 1.5px solid #c8a87a;
    border-bottom: 1.5px solid #c8a87a;
    min-height: 108px;
    padding: 7px 7px 8px;
    background: var(--paper);
    position: relative;
    overflow: hidden;
  }
  /* Rope border dots overlay */
  .day-cell::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    border-right: 1px dashed rgba(180,140,80,0.15);
    border-bottom: 1px dashed rgba(180,140,80,0.15);
  }
  .day-cell.empty {
    background: #ede0c4;
    opacity: 0.45;
  }
  .day-cell.weekend {
    background: #f7edda;
  }
  .day-cell.today {
    background: #fffbeb;
    box-shadow: inset 0 0 0 2px #d97706;
  }
  .day-cell.past { opacity: 0.5; }

  /* Fish watermark per cell — subtle */
  .day-cell.weekend::before {
    content: '🐟';
    position: absolute;
    bottom: 3px;
    right: 4px;
    font-size: 18px;
    opacity: 0.045;
    pointer-events: none;
    transform: scaleX(-1);
    line-height: 1;
  }

  .day-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    color: #9a7850;
    line-height: 1;
    margin-bottom: 5px;
    letter-spacing: 0.02em;
  }
  .day-cell.weekend .day-num { color: #b84a00; }
  .day-cell.today .day-num   { color: #d97706; }

  .staff-list { display: flex; flex-direction: column; gap: 3px; }

  .staff-entry {
    display: flex;
    align-items: baseline;
    gap: 3px;
    font-size: 12px;
    font-weight: 700;
    line-height: 1.3;
    letter-spacing: 0.01em;
  }
  .opener-star {
    font-size: 8px;
    opacity: 0.65;
    flex-shrink: 0;
  }
  .staff-entry.kasper { color: var(--kasper); }
  .staff-entry.claire { color: var(--claire); }
  .staff-entry.sid    { color: var(--sid); }
  .staff-entry.daisy  { color: var(--daisy); }
  .staff-entry.jake   { color: var(--jake); }
  .staff-entry.jim    { color: var(--jim); }
  .staff-entry.roxy   { color: var(--roxy); }
  .staff-entry.max    { color: var(--max); }

  .flag {
    position: absolute;
    top: 5px;
    right: 6px;
    font-size: 11px;
    line-height: 1;
  }

  .month-footer {
    background: var(--paper-dark);
    border-top: 2px solid #c8a87a;
    padding: 11px 18px;
    font-size: 11px;
    color: #6a5030;
    font-weight: 600;
    letter-spacing: 0.03em;
    line-height: 1.9;
  }
  .month-footer span { margin-right: 20px; }
  .month-footer strong { color: #3a2010; }

  .month-header {
    background: linear-gradient(135deg, #1c1209 0%, #2a1e0e 60%, #1c1209 100%);
    padding: 18px 22px 15px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    border-bottom: 3px solid #8a6a3a;
    position: relative;
    overflow: hidden;
  }
  /* Subtle rope texture in header */
  .month-header::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      45deg,
      transparent,
      transparent 8px,
      rgba(255,255,255,0.015) 8px,
      rgba(255,255,255,0.015) 9px
    );
    pointer-events: none;
  }
  /* Large ghosted fish in header */
  .month-header::after {
    content: '🐟';
    position: absolute;
    right: 16px;
    top: 50%;
    transform: translateY(-50%) scaleX(-1);
    font-size: 72px;
    opacity: 0.04;
    pointer-events: none;
    line-height: 1;
  }
  .month-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 56px;
    color: #fdf6e9;
    letter-spacing: 0.05em;
    line-height: 1;
    position: relative;
    z-index: 1;
  }
  .month-year {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    color: #7a6a4a;
    letter-spacing: 0.08em;
    margin-top: 8px;
    align-self: flex-end;
    position: relative;
    z-index: 1;
  }
  .draft-badge {
    margin-left: 8px;
    align-self: flex-end;
    margin-bottom: 5px;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    background: rgba(255,255,255,0.07);
    color: #8a7a5a;
    border: 1px solid #4a3a1a;
    padding: 3px 8px;
    border-radius: 3px;
    position: relative;
    z-index: 1;
  }
  .legend {
    margin-left: auto;
    display: flex;
    flex-wrap: wrap;
    gap: 8px 14px;
    align-items: center;
    justify-content: flex-end;
    position: relative;
    z-index: 1;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    color: #fdf6e9;
    opacity: 0.85;
  }
  .legend-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .legend-note {
    font-size: 9px;
    color: #6a5a3a;
    letter-spacing: 0.04em;
    font-weight: 400;
    text-transform: none;
  }
  .month-block.collapsed .dow-row,
  .month-block.collapsed .cal-grid,
  .month-block.collapsed .month-footer { display: none; }
  .month-header { cursor: pointer; user-select: none; }
  .collapse-indicator {
    margin-left: 10px;
    font-size: 13px;
    color: #7a6a4a;
    align-self: flex-end;
    margin-bottom: 10px;
    transition: transform 0.2s;
    flex-shrink: 0;
  }
  .month-block.collapsed .collapse-indicator { transform: rotate(-90deg); }
  .archived-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #5a4a2a;
    background: rgba(255,255,255,0.07);
    border: 1px solid #3a2a0a;
    padding: 3px 8px;
    border-radius: 3px;
    margin-left: 8px;
    align-self: flex-end;
    margin-bottom: 8px;
  }
    .day-cell { min-height: 80px; padding: 5px 4px; }
    .day-num { font-size: 17px; }
    .staff-entry { font-size: 10.5px; }
    .month-name { font-size: 44px; }
    .legend { display: none; }
    .flag { font-size: 10px; top: 3px; right: 3px; }
    .month-header::after { font-size: 56px; }
  }

  @media print {
    body { background: white; padding: 0; }
    .month-block { box-shadow: none; border-radius: 0; page-break-after: always; }
    .day-cell { min-height: 88px; }
    .day-cell.past { opacity: 1; }
  }
</style>
</head>
<body>
<div class="page" id="root"></div>

<script>
// ── STAFF ─────────────────────────────────────────────────────────────────────
const STAFF = {
  kasper: { name: 'Kasper', color: '#3a6fd8' },
  claire: { name: 'Claire', color: '#9b30b8' },
  sid:    { name: 'Sid',    color: '#d94f7a' },
  daisy:  { name: 'Daisy',  color: '#cc3333' },
  jake:   { name: 'Jake',   color: '#2e9e45' },
  jim:    { name: 'Jim',    color: '#d4751a' },
  roxy:   { name: 'Roxie',   color: '#1a1a1a' },
  max:    { name: 'Max',    color: '#0e9e9e' },
};

// ── OPENER LOGIC ──────────────────────────────────────────────────────────────
// dow: 0=Mon, 1=Tue, 2=Wed, 3=Thu, 4=Fri, 5=Sat, 6=Sun
function getOpener(dow, staff) {
  if (dow === 1 && staff.includes('claire')) return 'claire';
  if (dow === 6 && staff.includes('sid'))    return 'sid';
  if (staff.includes('kasper'))              return 'kasper';
  if (dow === 6 && staff.includes('jake'))   return 'jake';
  if (staff.includes('sid'))                 return 'sid';
  return staff[0] || null;
}

// ── STANDARD TEMPLATE ─────────────────────────────────────────────────────────
// Generates default staffing for any date based on rules
// dow: 0=Mon..6=Sun
function standardShifts(dow) {
  switch(dow) {
    case 0: return ['kasper','sid'];        // Mon: Kasper opens, Sid
    case 1: return ['claire','sid'];        // Tue: Claire opens, Sid
    case 2: return ['kasper'];              // Wed: Kasper only (Sid off)
    case 3: return ['kasper','daisy'];      // Thu: Kasper, Daisy (Sid off)
    case 4: return ['kasper','sid'];        // Fri: Kasper, Sid
    case 5: return ['kasper','sid','jake']; // Sat: Kasper opens, Sid, Jake
    case 6: return ['sid','jake','jim'];    // Sun: Sid opens, Jake, Jim
    default: return [];
  }
}

// ── CONFIRMED ROTA — JUNE & JULY ─────────────────────────────────────────────
const CONFIRMED = {
  // ══ JUNE 2026 ══
  '2026-06-01': ['kasper'],
  '2026-06-02': ['claire'],
  '2026-06-03': ['kasper'],
  '2026-06-04': ['kasper','daisy'],
  '2026-06-05': ['kasper'],
  '2026-06-06': ['kasper','sid','jake'],
  '2026-06-07': ['sid','jake','jim'],

  '2026-06-08': ['kasper'],
  '2026-06-09': ['claire'],
  '2026-06-10': ['kasper'],
  '2026-06-11': ['kasper'],
  '2026-06-12': ['kasper'],
  '2026-06-13': ['kasper','sid','jake'],
  '2026-06-14': ['sid','jake','jim'],

  '2026-06-15': ['kasper'],
  '2026-06-16': ['claire','sid'],
  '2026-06-17': ['kasper','jim'],
  '2026-06-18': ['kasper','daisy'],
  '2026-06-19': ['kasper','sid'],
  '2026-06-20': ['kasper','jake','jim'],
  '2026-06-21': ['sid','jake'],

  '2026-06-22': ['kasper','sid'],
  '2026-06-23': ['claire','sid'],
  '2026-06-24': ['kasper','daisy'],
  '2026-06-25': ['kasper','daisy'],
  '2026-06-26': ['kasper','sid'],
  '2026-06-27': ['kasper','sid','jake'],
  '2026-06-28': ['sid','jake','max'],

  '2026-06-29': ['kasper','sid'],
  '2026-06-30': ['claire','sid'],

  // ══ JULY 2026 ══
  '2026-07-01': ['kasper','jim'],
  '2026-07-02': ['kasper','daisy'],
  '2026-07-03': ['jim','daisy'],
  '2026-07-04': ['jake','jim','roxy'],
  '2026-07-05': ['jake','jim'],

  '2026-07-06': ['kasper','claire'],
  '2026-07-07': ['claire','sid'],
  '2026-07-08': ['kasper','daisy'],
  '2026-07-09': ['kasper','daisy'],
  '2026-07-10': ['sid','roxy'],  '2026-07-11': ['sid','jake','jim'],
  '2026-07-12': ['sid','jake','jim'],

  '2026-07-13': ['sid','jim'],
  '2026-07-14': ['claire','sid'],
  '2026-07-15': ['sid','roxy'],
  '2026-07-16': ['kasper','daisy'],
  '2026-07-17': ['kasper','sid'],
  '2026-07-18': ['kasper','sid','jake'],
  '2026-07-19': ['sid','jake','jim'],

  '2026-07-20': ['kasper','sid'],
  '2026-07-21': ['claire','sid'],
  '2026-07-22': ['kasper','jim'],
  '2026-07-23': ['kasper','daisy'],
  '2026-07-24': ['kasper','sid'],
  '2026-07-25': ['kasper','sid','jake'],
  '2026-07-26': ['jake','jim','max'],

  '2026-07-27': ['kasper','jim'],
  '2026-07-28': ['claire','jim'],
  '2026-07-29': ['kasper','jim'],
  '2026-07-30': ['kasper','daisy'],
  '2026-07-31': ['kasper','sid'],

  // ══ AUGUST 2026 ══
  '2026-08-19': ['kasper','roxy'],
  '2026-08-26': ['kasper','roxy'],
};

// ── FLAGS ─────────────────────────────────────────────────────────────────────
const FLAGS = new Set([
  // June
  '2026-06-15','2026-06-21',
  // July
  // No current flags
]);

// ── HOLIDAY FOOTER NOTES ──────────────────────────────────────────────────────
const HOLIDAY_NOTES = {
  '2026-06': [
    { name: 'Daisy',  note: 'off 11 June' },
    { name: 'Sid',    note: 'off 20 June' },
    { name: 'Jim',    note: 'away 21–28 June' },
  ],
  '2026-07': [
    { name: 'Sid',    note: 'off 3–6 July & 26–29 July' },
    { name: 'Kasper', note: 'off 3–4 July & 10–14 July' },
  ],
};

// ── MONTHS TO RENDER ──────────────────────────────────────────────────────────
const MONTHS = [
  { year: 2026, month: 5,  label: 'June',      draft: false },
  { year: 2026, month: 6,  label: 'July',      draft: false },
  { year: 2026, month: 7,  label: 'August',    draft: true  },
  { year: 2026, month: 8,  label: 'September', draft: true  },
  { year: 2026, month: 9,  label: 'October',   draft: true  },
  { year: 2026, month: 10, label: 'November',  draft: true  },
  { year: 2026, month: 11, label: 'December',  draft: true  },
];

// ── HELPERS ───────────────────────────────────────────────────────────────────
const DOW_LABELS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const todayStr = new Date().toISOString().slice(0,10);
function pad(n) { return String(n).padStart(2,'0'); }
function dk(y, m, d) { return `${y}-${pad(m+1)}-${pad(d)}`; }
function monthKey(y, m) { return `${y}-${pad(m+1)}`; }

// ── RENDER ────────────────────────────────────────────────────────────────────
function renderMonth({ year, month, label, draft }) {
  // Use UTC to avoid timezone-related day-of-week errors on different devices
  const firstDow = new Date(Date.UTC(year, month, 1)).getUTCDay();
  const startOffset = firstDow === 0 ? 6 : firstDow - 1;
  const daysInMonth = new Date(Date.UTC(year, month + 1, 0)).getUTCDate();

  // Collect which staff appear this month for legend
  const usedStaff = new Set();
  for (let d = 1; d <= daysInMonth; d++) {
    const dow = (startOffset + d - 1) % 7;
    const key = dk(year, month, d);
    const staff = CONFIRMED[key] || standardShifts(dow);
    staff.forEach(s => usedStaff.add(s));
  }

  const legendHTML = Object.keys(STAFF)
    .filter(s => usedStaff.has(s))
    .map(s => `
      <div class="legend-item">
        <div class="legend-dot" style="background:${STAFF[s].color}"></div>
        ${STAFF[s].name}
      </div>`).join('')
    + `<div class="legend-item"><span class="legend-note">★ opens &nbsp;·&nbsp; 🚩 needs cover</span></div>`;

  // Empty lead cells
  let cells = '';
  for (let i = 0; i < startOffset; i++) {
    cells += `<div class="day-cell empty"></div>`;
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const key = dk(year, month, d);
    const dow = (startOffset + d - 1) % 7;
    const isWeekend = dow >= 5;
    const isToday = key === todayStr;
    const isPast = key < todayStr;
    const staff = CONFIRMED[key] !== undefined ? CONFIRMED[key] : standardShifts(dow);
    const op = getOpener(dow, staff);
    const needsFlag = FLAGS.has(key);

    const classes = ['day-cell',
      isWeekend ? 'weekend' : '',
      isToday   ? 'today'   : '',
      (isPast && !isToday) ? 'past' : '',
    ].filter(Boolean).join(' ');

    const staffRows = staff.map(sid => {
      const star = sid === op ? `<span class="opener-star">★</span>` : '';
      return `<div class="staff-entry ${sid}">${star}${STAFF[sid].name}</div>`;
    }).join('');

    cells += `
      <div class="${classes}">
        <div class="day-num">${d}</div>
        <div class="staff-list">${staffRows}</div>
        ${needsFlag ? `<div class="flag">🚩</div>` : ''}
      </div>`;
  }

  // Trailing empty cells
  const total = startOffset + daysInMonth;
  const trail = total % 7 === 0 ? 0 : 7 - (total % 7);
  for (let i = 0; i < trail; i++) cells += `<div class="day-cell empty"></div>`;

  // Footer
  const notes = (HOLIDAY_NOTES[monthKey(year, month)] || [])
    .map(h => `<span><strong>${h.name}</strong> — ${h.note}</span>`).join('');
  const footerHTML = notes ? `<div class="month-footer">${notes}</div>` : '';

  // Is this month fully in the past?
  const now = new Date();
  const isPastMonth = (year < now.getFullYear()) ||
    (year === now.getFullYear() && month < now.getMonth());

  return `
    <div class="month-block${isPastMonth ? ' collapsed' : ''}" id="month-${year}-${month}">
      <div class="month-header" onclick="toggleMonth('month-${year}-${month}')">
        <div class="month-name">${label}</div>
        <div class="month-year">${year}</div>
        ${isPastMonth ? `<div class="archived-label">Archive</div>` : ''}
        ${draft ? `<div class="draft-badge">Draft</div>` : ''}
        <div class="collapse-indicator">▼</div>
        <div class="legend">${legendHTML}</div>
      </div>
      <div class="dow-row">
        ${DOW_LABELS.map((d,i) =>
          `<div class="dow-cell${i>=5?' we':''}">${d}</div>`).join('')}
      </div>
      <div class="cal-grid">${cells}</div>
      ${footerHTML}
    </div>`;
}

document.getElementById('root').innerHTML = MONTHS.map(renderMonth).join('');

function toggleMonth(id) {
  document.getElementById(id).classList.toggle('collapsed');
}
</script>
<script>
  // Force fresh version every time the page is opened
  if (!window.location.search.includes('fresh')) {
    window.location.replace(window.location.href.split('?')[0] + '?fresh=' + Date.now());
  }
</script>
</body>
</html>
